name: CodeQL

# SAST via GitHub CodeQL.
#
# LET OP - bewuste keuze, verantwoord in het complianceverslag:
# Upload van resultaten naar het Security-tab (Code scanning alerts) vereist
# GitHub Advanced Security, dat niet beschikbaar is op deze private repo met
# een Pro-plan. De analyse zelf draait wel volledig (scant de hele module).
# Daarom: upload naar Security-tab uitgezet (upload: false) en de SARIF-output
# als CI-artifact bewaard, zodat het scanbewijs herleidbaar vastligt.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # wekelijks, maandag 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (java)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build
        run: mvn -B clean install -DskipTests
        env:
          CI: "true"

      # Analyse draaien, SARIF lokaal genereren, NIET uploaden naar Security-tab.
      # continue-on-error: als de action toch een geblokkeerde API-call doet,
      # laten we de job niet falen - het scanbewijs zit in de artifact.
      - name: Perform CodeQL Analysis
        id: codeql
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
          upload: false
          output: codeql-results

      - name: Upload CodeQL SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results
          if-no-files-found: error